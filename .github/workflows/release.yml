name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-publish:
    name: Build dmg (Apple Silicon) and publish release
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            native-embed/target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('native-embed/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      - name: Install JS deps
        run: bun install --frozen-lockfile

      - name: Install napi CLI
        working-directory: native-embed
        run: bun install --frozen-lockfile

      - name: Build native embedder (release, with LTO)
        working-directory: native-embed
        run: bunx --bun napi build --platform --release

      - name: Run tests before packaging
        run: bun test

      - name: Package macOS dmg (arm64)
        run: bun run package:mac
        env:
          # Ad-hoc signed; explicitly disable any inherited identity.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          # Forward token so electron-builder doesn't bail when it sees
          # a tag in env (we still publish via softprops/action-gh-release
          # below, but keep this in case --publish=never is overridden).
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List release artifacts
        run: ls -la release/

      - name: Resolve tag name
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute SHA-256 of dmg
        run: |
          cd release
          shasum -a 256 Cairn-*.dmg > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: Cairn ${{ steps.tag.outputs.name }}
          body: |
            ## Cairn ${{ steps.tag.outputs.name }} — Apple Silicon only

            See [CHANGELOG.md](./CHANGELOG.md) for the full notes.

            **Hardware required:** Apple Silicon Mac (M1 / M2 / M3 / M4 or newer), macOS 12+. Intel Macs are not supported in this build.

            **First launch:** the dmg is ad-hoc signed (no Apple Developer ID), so Gatekeeper will block the first open. Right-click → Open, or run `xattr -dr com.apple.quarantine /Applications/Cairn.app`.

            See [INSTALL.md](./INSTALL.md) for the full install guide.
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.name, '-') }}
          files: |
            release/Cairn-*.dmg
            release/Cairn-*.dmg.blockmap
            release/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
